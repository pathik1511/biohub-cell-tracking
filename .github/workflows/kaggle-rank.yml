name: kaggle-rank
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual "Run workflow" button
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install classic Kaggle CLI
        run: pip install --quiet "kaggle==1.6.17"
      - name: Configure Kaggle auth (write kaggle.json from secrets)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          KU=$(printf '%s' "$KAGGLE_USERNAME" | tr -d '\r\n ')
          KK=$(printf '%s' "$KAGGLE_KEY" | tr -d '\r\n ')
          printf '{"username":"%s","key":"%s"}' "$KU" "$KK" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "wrote kaggle.json for user: $KU (key length: ${#KK})"
      - name: Update rank
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_TEAM: ${{ vars.KAGGLE_TEAM }}
        run: python scripts/update_rank.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/kaggle-rank.json README.md
          git commit -m "chore: update kaggle rank" || echo "no change"
          git push
