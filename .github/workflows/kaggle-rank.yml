name: kaggle-rank
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual "Run workflow" button
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install current Kaggle CLI
        run: pip install --quiet --upgrade kaggle
      - name: Configure Kaggle auth (new KGAT_ token -> access_token)
        env:
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          TOKEN=$(python -c "import os;print(os.environ['KAGGLE_KEY'].strip().strip(chr(34)).strip(chr(39)))")
          printf '%s' "$TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "wrote access_token (length: ${#TOKEN}, starts with: ${TOKEN:0:5})"
      - name: Update rank
        env:
          KAGGLE_TEAM: ${{ vars.KAGGLE_TEAM }}
        run: python scripts/update_rank.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/kaggle-rank.json README.md
          git commit -m "chore: update kaggle rank" || echo "no change"
          git push
